name: Build & Release xv6 Book PDF

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写权限来创建 Release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies (TeX Live + booklet tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            gnuplot \
            ghostscript \
            build-essential

      - name: Build & install mpage (from source, not in Ubuntu 24.04 repos)
        run: |
          curl -sL https://www.mesa.nl/pub/mpage/mpage-2.5.8.tgz | tar xz
          make -C mpage-2.5.8 PAGESIZE=Letter
          sudo make -C mpage-2.5.8 install PAGESIZE=Letter

      - name: Pre-clone xv6-riscv (HTTPS to avoid SSH auth in CI)
        run: |
          git clone --depth 1 https://github.com/mit-pdos/xv6-riscv.git xv6-riscv-src

      - name: Build the book
        run: |
          make 2>&1

      - name: Upload PDF as artifact (方便下载)
        uses: actions/upload-artifact@v4
        with:
          name: xv6-book
          path: book.pdf
          if-no-files-found: error

      - name: Publish to Release (仅 push 到 main 时)
        if: github.event_name == 'push' && github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 生成版本标识
          VERSION="build-$(date +%Y%m%d)-${GITHUB_SHA:0:7}"

          # 删除旧的 latest release 和 tag（如果存在）
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true

          # 创建新的 Release
          gh release create latest \
            --title "xv6 Book - ${VERSION}" \
            --notes "自动构建于 $(date -u '+%Y-%m-%d %H:%M UTC')\nCommit: ${GITHUB_SHA}\n源码: mit-pdos/xv6-riscv (latest)" \
            book.pdf

      - name: Summary
        run: |
          ls -lh book.pdf
          echo "✅ xv6 book compiled successfully"
